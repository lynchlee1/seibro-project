
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIND Project</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', 'Malgun Gothic', Arial, sans-serif;
            background: linear-gradient(135deg, #1D79B0 0%, #1D5D8C 50%, #344B79 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .button-group { 
            display: flex; 
            gap: 12px; 
            justify-content: center; 
            flex-wrap: wrap; 
        }
        .btn { 
            white-space: nowrap; 
            min-width: 110px; 
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 650px;
            min-height: 700px;
            position: relative;
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo {
            width: 320px;
            height: 100px;
            border-radius: 15px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
        }
        
        .title {
            font-size: 28px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #6c757d;
            font-size: 16px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-label {
            display: block;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .form-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Segoe UI', 'Microsoft YaHei', 'Malgun Gothic', Arial, sans-serif;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #007bff;
            background: white;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
        }
        
        .date-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .checkbox {
            width: 20px;
            height: 20px;
            accent-color: #007bff;
        }
        
        .checkbox-label {
            color: #2c3e50;
            font-size: 14px;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            width: 100%;
        }
        
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 120px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,123,255,0.3);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        /* Styles for checkbox as button */
        .btn-checkbox-toggle {
            display: inline-block;
        }
        .btn-checkbox-toggle input[type="checkbox"] {
            display: none;
        }
        .btn-checkbox-toggle label {
            display: inline-block;
            padding: 4px 12px;
            margin-bottom: 0;
            font-size: 12px;
            font-weight: 500;
            line-height: 1.2;
            text-align: center;
            white-space: nowrap;
            vertical-align: middle;
            cursor: pointer;
            border: 1px solid #6c757d;
            border-radius: 6px;
            transition: all 0.3s ease;
            color: #6c757d;
            background-color: transparent;
            min-width: 100px;
            height: 28px;
        }
        .btn-checkbox-toggle input[type="checkbox"]:checked + label {
            color: #fff;
            background-color: #6c757d;
            border-color: #6c757d;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(108,117,125,0.3);
        }
        .btn-checkbox-toggle label:hover {
            color: #fff;
            background-color: #5a6268;
            border-color: #5a6268;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(90,98,104,0.3);
        }
        
        .btn-fixed {
            position: fixed !important;
        }
        
        .btn-absolute {
            position: absolute !important;
        }
        
        .btn-relative {
            position: relative !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <form id="configForm">
            
        <div class="header">
            
        <div class="logo">
            <img src="logo.jpg" alt="Logo" style="width:320px;height:100px;object-fit:contain;border-radius:10px;">
        </div>
        
            <h1 class="title">"메자닌 조회 자동화 프로그램"</h1>
            <p class="subtitle">"타임폴리오 대체투자본부"</p>
        </div>
        

        <div class="form-group">
            <div class="date-row">
                <div>
                    <label class="form-label" for="fromDate">검색 시작일</label>
                    <input type="date" id="fromDate" name="fromDate" class="form-input" 
                           value="2024-01-01" required>
                </div>
                <div>
                    <label class="form-label" for="toDate">검색 종료일</label>
                    <input type="date" id="toDate" name="toDate" class="form-input" 
                           value="2025-01-01" required>
                </div>
            </div>
        </div>
        

            <div class="checkbox-group" >
                <input type="checkbox" id="headless" name="headless" class="checkbox" >
                <label for="headless" class="checkbox-label">Chrome 팝업 없이 실행하기</label>
            </div>
            

        <div class="button-group" style="margin-bottom:8px;">
            
        <button id="runBtn" type="submit" class="btn btn-primary" 
                onclick="executeRunFunction()" >실행</button>
        
        <button id="discardBtn" type="button" class="btn btn-danger" 
                onclick="discardCompanyData()" >버리기</button>
        
        </div>
        

        <button id="backBtn" type="button" class="btn btn-secondary" 
                onclick="alert('프로그램을 종료합니다.');" style="position:absolute;right:20px;bottom:20px">종료</button>
        
        </form>
    </div>
    
    <script>
        
        const SERVER_PORT = 5001;
        const urlParams = new URLSearchParams(window.location.search);

        const CONFIG = {
            runFunction: "<function run_scraper at 0x106b0d260>",
            databaseAddress: "database.json",
        };

        function executeRunFunction() {
            const fromDate = document.getElementById('fromDate').value;
            const toDate = document.getElementById('toDate').value;
            const headless = document.getElementById('headless').checked;
            
            const params = {from_date: fromDate, to_date: toDate, headless: headless};
            
            if (CONFIG.runFunction) {
                alert(`프로그램을 실행합니다.\n\nRun Function: ${CONFIG.runFunction}\nParameters: ${JSON.stringify(params, null, 2)}`);
                fetch(`/api/run/${CONFIG.runFunction}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(params)
                })
                .then(response => response.json())
                .then(result => {
                    if (result.success) {
                        alert(`${CONFIG.runFunction} 실행이 시작되었습니다.\n\n진행상황은 서버 콘솔에서 확인할 수 있습니다.`);
                    } else {
                        alert(`실행 실패: ${result.message}`);
                    }
                })
                .catch(error => {
                    alert(`API 호출 오류: ${error.message}`);
                });
            }
            return false;
        }
        
        function validateAndExecute() {
            return executeRunFunction();
        }
        
        async function discardCompanyData() {
            const urlParams = new URLSearchParams(window.location.search);
            if (confirm(`정말로 "${companyName}"의 ${modeText} 데이터를 삭제하시겠습니까?\n\n이 작업은 되돌릴 수 없습니다.`)) {
                try {
                    const response = await fetch(`/api/discard-company-data`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        })
                    });
                    const result = await response.json();
                    
                    if (result.success) {
                        alert(`데이터가 성공적으로 삭제되었습니다.`);
                    } else {
                        alert(`데이터 삭제 실패: ${result.message}`);
                    }
                } catch (error) {
                    console.error('데이터 삭제 오류:', error);
                    alert('데이터 삭제 중 오류가 발생했습니다: ' + error.message);
                }
            }
        }
        document.getElementById('configForm').addEventListener('submit', function(e) {
            e.preventDefault();
            validateAndExecute();
        });
    
    </script>
</body>
</html>
